<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <div>
    <h1>To-Do List</h1>
        <input class="taskInput" type="text" placeholder="Type in a new task">
        <input class="taskDateInput" type="date">
        <input class="taskTimeInput" type="time">
        <button class="addTaskBtn">Add Task</button>
    </div>

    <div class="options">
        <input class="taskSearch" type="search" placeholder="Search a task">
        <button class="enableNotificationsBtn">Enable Notifications</button>
        <button class="themeBtn">Dark</button>
    </div>

    <div>
        <ul>
            <!-- Tasks will be added here dynamically -->
        </ul>
    </div>
    <script src="todo.js" defer></script>
</body>
</html>
